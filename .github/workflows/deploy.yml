name: Clinical AI Pipeline Sync
on:
  push:
    branches: [ main ]
    # Ignore documentation updates to save compute
    paths-ignore:
      - '**.md'

jobs:
  deploy-to-azure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Execute Reliability Pipeline
        # This runs your framework every time you push code to main
        run: |
          python src/run_reliability_pipeline.py
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    
